version: "3.9"

services:
    pdf-renamer:
        image: ghcr.io/minenmaster/pdf-renamer:latest
        restart: unless-stopped
        environment:
            - OPENAI_API_KEY=replace-me
            - TENANT_ID=replace-me
            - CLIENT_ID=replace-me
            # Authentication mode - choose ONE:
            #
            # Personal OneDrive (device-code / one-time login):
            #   Leave CLIENT_SECRET and USER_ID commented out or empty.
            #   On first run, check the logs for the login URL + code.
            #   The token is persisted in the token_cache volume.
            #
            # Work/school OneDrive with M365 license (app-only, no login prompt):
            #   Uncomment and set both CLIENT_SECRET and USER_ID.
            #
            # - CLIENT_SECRET=replace-me
            # - USER_ID=user@example.com
            - SOURCE_FOLDER_ID=replace-me
            - OUTPUT_BASE_FOLDER=Archive
            - CLASSIFICATION_RULES_FILE=/app/classification_rules.yaml
            - POLL_INTERVAL_SECONDS=30
            - MAX_FILENAME_LENGTH=100
            # Uncomment to set timezone
            # - TZ=Europe/Zurich
        volumes:
            # Persists the MSAL token cache across container restarts and upgrades.
            # Required for personal OneDrive (device-code flow).
            - token_cache:/data
            # Optional: mount custom classification rules
            # - ./classification_rules.yaml:/app/classification_rules.yaml:ro

volumes:
    token_cache:
