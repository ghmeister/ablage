<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meisters Ablage">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>Anmelden – Meisters Ablage</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .login-card { max-width: 360px; margin: 6rem auto; }
  </style>
</head>
<body>
<div class="login-card card shadow-sm p-4">
  <h5 class="card-title mb-4 fw-semibold">📄 Meisters Ablage</h5>
  {% if error %}
  <div class="alert alert-danger py-2">{{ error }}</div>
  {% endif %}
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Benutzername</label>
      <input type="text" name="username" class="form-control" autofocus autocomplete="username">
    </div>
    <div class="mb-3">
      <label class="form-label">Passwort</label>
      <input type="password" name="password" class="form-control" autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-dark w-100">Anmelden</button>
  </form>
</div>
</body>
</html>
