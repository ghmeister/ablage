<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meisters Ablage">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>{% block title %}Meisters Ablage{% endblock %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .table-hover tbody tr { cursor: pointer; }
    .table-hover tbody tr:hover td { background-color: #e9ecef; }
    pre.extracted-text {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow-y: auto;
      font-size: 0.8rem;
    }
    .badge-type { font-size: 0.72rem; }
    .filename-cell { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.8rem; }

    /* Mobile card list */
    .doc-card { border-left: 4px solid #dee2e6; transition: background .15s; }
    .doc-card:active { background-color: #e9ecef; }
    .doc-card .doc-filename {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Larger tap targets for edit buttons on touch devices */
    @media (max-width: 767.98px) {
      .btn-edit-inline { padding: 0.35rem 0.6rem; font-size: 0.85rem; }
    }

    /* Hide PDF button in portrait mode to save space */
    @media (orientation: portrait) and (max-width: 767.98px) {
      .pdf-btn-portrait-hidden { display: none !important; }
    }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="/">📄 Meisters Ablage</a>
    <span class="text-secondary small">v{{ app_version }}</span>
    <a class="btn btn-outline-secondary btn-sm ms-auto me-2" href="/steuern">Steuern</a>
    <a class="btn btn-outline-secondary btn-sm me-2" href="/logs">Log</a>
    <a class="btn btn-outline-danger btn-sm" href="/logout">Abmelden</a>
  </div>
</nav>
<div class="container-lg pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
