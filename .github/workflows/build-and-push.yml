name: Build and Push Docker image

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    versioning:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.calculate-version.outputs.version-string }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  fetch-tags: true

            - name: Calculate version
              id: calculate-version
              if: ${{ github.event_name == 'push' }}
              uses: bitshifted/git-auto-semver@v2.0.11
              with:
                  create_tag: true
                  initial_version: 1.0.0

    build-and-push:
        needs: versioning
        if: ${{ github.event_name == 'push' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/minenmaster/pdf-renamer
                  tags: |
                      type=raw,value=${{ needs.versioning.outputs.version }}
                      type=raw,value=latest

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: APP_VERSION=${{ needs.versioning.outputs.version }}
